<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stonegraph - Memory Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .header p {
      color: #a0a0a0;
      font-size: 0.9rem;
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: #a0a0a0;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00d2ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .memory-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .media-container {
      width: 100%;
      position: relative;
      background: rgba(0, 0, 0, 0.3);
    }
    
    .media-container img,
    .media-container video {
      width: 100%;
      display: block;
      max-height: 500px;
      object-fit: contain;
    }
    
    .media-placeholder {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      color: #a0a0a0;
      font-size: 1.2rem;
    }
    
    .memory-content {
      padding: 2rem;
    }
    
    .memory-title {
      font-size: 1.5rem;
      color: #ffffff;
      margin-bottom: 1rem;
    }
    
    .memory-description {
      color: #c0c0c0;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    .memory-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    
    .meta-tag {
      background: rgba(0, 210, 255, 0.1);
      border: 1px solid rgba(0, 210, 255, 0.3);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #00d2ff;
    }
    
    .arweave-info {
      background: rgba(0, 0, 0, 0.2);
      padding: 1.5rem;
      border-radius: 10px;
      margin-top: 1.5rem;
    }
    
    .arweave-info h3 {
      color: #00d2ff;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    
    .arweave-link {
      display: block;
      color: #00d2ff;
      text-decoration: none;
      word-break: break-all;
      font-size: 0.9rem;
      padding: 0.5rem;
      background: rgba(0, 210, 255, 0.05);
      border-radius: 5px;
      transition: background 0.2s;
    }
    
    .arweave-link:hover {
      background: rgba(0, 210, 255, 0.1);
    }
    
    .verification-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 210, 255, 0.1);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #00d2ff;
    }
    
    .error {
      text-align: center;
      padding: 2rem;
      color: #ff6b6b;
    }
    
    .footer {
      text-align: center;
      margin-top: 2rem;
      color: #a0a0a0;
      font-size: 0.8rem;
    }
    
    .footer a {
      color: #00d2ff;
      text-decoration: none;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }
      
      .header h1 {
        font-size: 1.5rem;
      }
      
      .memory-content {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Stonegraph Memory Viewer</h1>
      <p>Permanently stored on Arweave blockchain</p>
    </div>
    
    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading memory from Arweave...</p>
      </div>
    </div>
    
    <div class="footer">
      <p>This memory is permanently stored on <a href="https://arweave.org" target="_blank" rel="noopener">Arweave</a></p>
      <p>Powered by <a href="https://stonegraph.ai" target="_blank" rel="noopener">Stonegraph</a></p>
    </div>
  </div>
  
  <script>
    // Get transaction ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const txId = urlParams.get('tx');
    
    async function loadMemory() {
      const contentDiv = document.getElementById('content');
      
      if (!txId) {
        contentDiv.innerHTML = '<div class="error">No transaction ID provided</div>';
        return;
      }
      
      try {
        // Load transaction data from Arweave
        const response = await fetch(`https://arweave.net/${txId}`);
        
        if (!response.ok) {
          throw new Error('Failed to load data from Arweave');
        }
        
        const contentType = response.headers.get('content-type');
        
        if (contentType && contentType.includes('application/json')) {
          // JSON metadata file
          const data = await response.json();
          renderMemory(data, txId);
        } else if (contentType && contentType.startsWith('image/')) {
          // Direct image file
          renderMedia(txId, contentType, null);
        } else {
          throw new Error('Unsupported content type');
        }
      } catch (error) {
        contentDiv.innerHTML = `<div class="error">Error loading memory: ${error.message}</div>`;
      }
    }
    
    function renderMemory(data, txId) {
      const contentDiv = document.getElementById('content');
      
      const title = data.title || 'Untitled Memory';
      const description = data.description || 'No description available';
      const mediaUrl = data.media_url || data.url;
      const mediaType = data.type || data.media_type || 'image';
      const createdAt = data.created_at ? new Date(data.created_at).toLocaleDateString() : '';
      const tags = data.tags || [];
      
      contentDiv.innerHTML = `
        <div class="memory-card">
          <div class="media-container">
            ${mediaUrl ? renderMediaContent(mediaUrl, mediaType) : '<div class="media-placeholder">Media not available</div>'}
          </div>
          <div class="memory-content">
            <h2 class="memory-title">${escapeHtml(title)}</h2>
            <p class="memory-description">${escapeHtml(description)}</p>
            
            ${tags.length > 0 ? `
              <div class="memory-meta">
                ${tags.map(tag => `<span class="meta-tag">#${escapeHtml(tag)}</span>`).join('')}
              </div>
            ` : ''}
            
            <div class="arweave-info">
              <h3>🔒 Permanently Stored on Arweave</h3>
              <a href="https://arweave.net/${txId}" target="_blank" rel="noopener" class="arweave-link">
                https://arweave.net/${txId}
              </a>
              <div class="verification-badge">
                ✓ Verified on Blockchain
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderMedia(txId, contentType, metadata) {
      const contentDiv = document.getElementById('content');
      
      contentDiv.innerHTML = `
        <div class="memory-card">
          <div class="media-container">
            ${renderMediaContent(`https://arweave.net/${txId}`, contentType.startsWith('video') ? 'video' : 'image')}
          </div>
          <div class="memory-content">
            <div class="arweave-info">
              <h3>🔒 Permanently Stored on Arweave</h3>
              <a href="https://arweave.net/${txId}" target="_blank" rel="noopener" class="arweave-link">
                https://arweave.net/${txId}
              </a>
              <div class="verification-badge">
                ✓ Verified on Blockchain
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderMediaContent(url, type) {
      if (type === 'video') {
        return `<video src="${escapeHtml(url)}" controls playsinline></video>`;
      }
      return `<img src="${escapeHtml(url)}" alt="Memory" loading="lazy" />`;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Load memory on page load
    loadMemory();
  </script>
</body>
</html>
